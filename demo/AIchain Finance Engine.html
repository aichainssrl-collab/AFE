<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIchain · Finance Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --font: "Plus Jakarta Sans", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --ink:#191B2E; --ink-2:#2C2F45; --muted:#5E6379; --faint:#9CA1B5;
  --bg:#F3F4FA; --surface:#FFFFFF; --surface-2:#F7F8FC; --line:#E8EAF2; --line-2:#EFF1F7;
  --brand:#5B3E91; --brand-soft:#EEE9F6;
  --topbar:#050636; --navy:#161640;
  --radius:16px; --radius-sm:11px;
  --shadow-sm:0 1px 2px rgba(20,22,50,.06), 0 1px 3px rgba(20,22,50,.04);
  --shadow:0 1px 2px rgba(20,22,50,.05), 0 10px 30px -12px rgba(40,30,80,.18);
  --shadow-lg:0 24px 60px -20px rgba(40,30,80,.28);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
#root{height:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:#5B3E91;color:#fff;}
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-thumb{background:#D6D9E6;border-radius:8px;border:3px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:#C2C6D8;}

/* ---------- App frame ---------- */
.app{height:100%;display:flex;flex-direction:column;}
.topbar{height:64px;flex:none;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;background:linear-gradient(100deg,#050636 0%,#0C0A33 48%,#161045 100%);
  position:relative;z-index:40;}
.tb-left{display:flex;align-items:center;gap:16px;}
.tb-logo{height:38px;width:auto;display:block;border-radius:7px;}
.tb-divider{width:1px;height:30px;background:rgba(255,255,255,.16);}
.tb-titles{display:flex;flex-direction:column;line-height:1.15;}
.tb-title{color:#fff;font-weight:700;font-size:16.5px;letter-spacing:-.01em;}
.tb-sub{color:#9FA0D6;font-size:11.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:14px;}
.tb-demo{display:flex;align-items:center;gap:7px;color:#B9BAE6;font-size:12.5px;font-weight:600;
  padding:6px 11px;border:1px solid rgba(255,255,255,.14);border-radius:99px;}
.tb-demo-dot{width:7px;height:7px;border-radius:50%;background:#00E6E6;box-shadow:0 0 0 3px rgba(0,230,230,.22);}

/* ---------- dropdown ---------- */
.cdrop{position:relative;}
.cdrop-btn{display:flex;align-items:center;gap:11px;min-width:230px;height:42px;padding:0 12px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:11px;color:#fff;transition:.15s;}
.cdrop-btn:hover{background:rgba(255,255,255,.12);}
.cdrop-btn.open{background:#fff;color:var(--ink);border-color:#fff;}
.cdrop-dot{width:9px;height:9px;border-radius:50%;flex:none;}
.cdrop-btn .cdrop-text{flex:1;text-align:left;}
.cdrop-text{display:flex;flex-direction:column;line-height:1.2;min-width:0;}
.cdrop-main{font-weight:650;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdrop-sub{font-size:11px;opacity:.62;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdrop-caret{flex:none;opacity:.7;transition:.2s;}
.cdrop-btn.open .cdrop-caret{transform:rotate(180deg);}
.cdrop-menu{position:absolute;top:50px;right:0;width:310px;background:#fff;border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow-lg);padding:7px;z-index:50;animation:pop .16s ease;}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98);}to{opacity:1;transform:none;}}
.cdrop-menu-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);padding:8px 10px 6px;}
.cdrop-item{display:flex;align-items:center;gap:11px;width:100%;padding:10px 10px;border-radius:10px;text-align:left;transition:.12s;}
.cdrop-item:hover{background:var(--surface-2);}
.cdrop-item.active{background:var(--brand-soft);}
.cdrop-item .cdrop-main{color:var(--ink);}
.cdrop-item .cdrop-sub{color:var(--muted);opacity:1;}
.cdrop-item>svg:last-child{color:var(--brand);margin-left:auto;flex:none;}

/* ---------- body / sidebar ---------- */
.body{flex:1;display:flex;min-height:0;}
.sidebar{width:282px;flex:none;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;}
.side-context{margin:18px 16px 8px;padding:14px;border-radius:13px;background:var(--surface-2);
  border:1px solid var(--line-2);position:relative;overflow:hidden;}
.side-context::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);}
.sc-row{display:flex;align-items:center;gap:9px;}
.sc-dot{width:9px;height:9px;border-radius:50%;}
.sc-name{font-weight:700;font-size:15.5px;letter-spacing:-.01em;}
.sc-barrier{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--muted);font-weight:500;}
.sc-barrier svg{color:var(--accent);flex:none;}
.side-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.snav{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border-radius:11px;
  color:var(--muted);font-weight:600;font-size:14px;transition:.13s;position:relative;}
.snav:hover{background:var(--surface-2);color:var(--ink-2);}
.snav.active{background:var(--accent);color:#fff;box-shadow:0 8px 18px -8px color-mix(in srgb,var(--accent) 70%,transparent);}
.snav.active svg{color:#fff;}
.snav>span:not(.snav-flag){flex:1;text-align:left;}
.snav-flag{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:6px;
  background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);}
.snav.active .snav-flag{background:rgba(255,255,255,.22);color:#fff;}
.side-foot{padding:14px 18px;border-top:1px solid var(--line);}
.sf-row{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ink-2);}
.sf-pulse{width:8px;height:8px;border-radius:50%;background:#1FAE6F;box-shadow:0 0 0 0 rgba(31,174,111,.5);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,174,111,.45);}70%{box-shadow:0 0 0 7px rgba(31,174,111,0);}100%{box-shadow:0 0 0 0 rgba(31,174,111,0);}}
.sf-sub{font-size:11px;color:var(--faint);margin-top:5px;}
.empty-side .side-empty{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--faint);
  padding:60px 20px;text-align:center;font-size:13px;font-weight:500;}

/* ---------- workspace ---------- */
.workspace{flex:1;overflow-y:auto;padding:34px 40px 60px;}
.screen{max-width:1200px;margin:0 auto;}
.kicker{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brand);margin-bottom:7px;}
.sec-title{font-size:25px;font-weight:750;letter-spacing:-.02em;margin:0;color:var(--ink);}
.sec-sub{font-size:14.5px;color:var(--muted);margin:7px 0 0;max-width:60ch;line-height:1.5;}

/* ---------- card ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);}

/* ---------- badges / buttons ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:650;padding:5px 10px;border-radius:8px;white-space:nowrap;line-height:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:650;border-radius:11px;transition:.15s;white-space:nowrap;}
.btn-md{height:42px;padding:0 17px;font-size:14px;}
.btn-lg{height:52px;padding:0 24px;font-size:15.5px;border-radius:13px;}
.btn-full{width:100%;}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 10px 22px -10px color-mix(in srgb,var(--brand) 70%,transparent);}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-primary:disabled{opacity:.55;transform:none;filter:none;cursor:default;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--surface-2);color:var(--ink);}
.btn-soft{background:var(--brand-soft);color:var(--brand);}

/* ---------- KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.kpi-grid.kpi-3{grid-template-columns:repeat(3,1fr);}
.kpi{padding:20px;display:flex;flex-direction:column;}
.kpi-label{font-size:13px;font-weight:600;color:var(--muted);}
.kpi-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.kpi-value{font-family:var(--font-mono);font-size:32px;font-weight:600;letter-spacing:-.02em;color:var(--ink);margin-top:14px;line-height:1;}
.kpi-unit{font-size:16px;color:var(--muted);margin-left:4px;font-weight:500;}
.kpi-note{font-size:12px;color:var(--faint);font-weight:500;}

/* ---------- field extraction ---------- */
.xfield{padding:12px 0;border-bottom:1px solid var(--line-2);}
.xfield:last-child{border-bottom:none;}
.xfield-label{font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.xfield-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.xfield-value{font-size:15px;font-weight:600;color:var(--ink);font-family:var(--font-mono);}
.xfield-conf{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;font-family:var(--font-mono);}
.conf-dot{width:7px;height:7px;border-radius:50%;}

/* ---------- toggle ---------- */
.toggle{width:44px;height:25px;border-radius:99px;background:#D6D9E6;position:relative;transition:.2s;flex:none;}
.toggle.on{background:var(--brand);}
.toggle-knob{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on .toggle-knob{left:22px;}

.round-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;}
.round-ic.ok{background:#E5F8EE;color:#13855A;}
.round-ic.danger{background:#FCE7E7;color:#C23434;}

.grid-2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;}
.chart-foot{margin-top:14px;display:flex;}
.mini-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin:9px 0;}
.mini-row>span:first-child{width:62px;font-weight:600;color:var(--ink-2);}
.mini-bar{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5B3E91,#3A266C);}
.mini-v{font-family:var(--font-mono);font-weight:600;color:var(--ink);width:46px;text-align:right;}

/* ---------- line draw anim ---------- */
.lc-line{stroke-dasharray:var(--lc-len);stroke-dashoffset:var(--lc-len);animation:draw 1.3s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}

/* ---------- overview ---------- */
.ov-hero{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:26px 28px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.ov-hero::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 40%,#00B4DB));}
.ov-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.ov-name{font-size:34px;font-weight:800;letter-spacing:-.025em;margin:2px 0 0;}
.ov-objs{display:flex;flex-wrap:wrap;gap:8px;max-width:420px;justify-content:flex-end;}
.ov-obj{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--line);padding:7px 12px;border-radius:99px;}
.ov-obj svg{color:var(--accent);}
.ov-barrier{display:flex;align-items:stretch;gap:18px;margin-top:24px;padding:18px;border-radius:14px;
  background:linear-gradient(180deg,var(--surface-2),#fff);border:1px solid var(--line);}
.ov-barrier-ic{width:42px;height:42px;border-radius:11px;background:#FCE7E7;color:#C23434;display:flex;align-items:center;justify-content:center;flex:none;}
.ov-barrier-body{flex:1;min-width:0;}
.ov-barrier-label{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#C23434;margin-bottom:5px;}
.ov-barrier-text{font-size:14.5px;color:var(--ink-2);line-height:1.45;font-weight:500;}
.ov-barrier-sep{width:1px;background:var(--line);}
.ov-cta{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-top:22px;
  background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 22px;box-shadow:var(--shadow-sm);}
.ov-cta-left{display:flex;align-items:center;gap:15px;}
.ov-cta-title{font-weight:700;font-size:16px;}
.ov-cta-sub{font-size:13.5px;color:var(--muted);margin-top:3px;}
.ov-processes{margin-top:22px;}
.ov-proc-title{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:12px;}
.ov-proc-list{display:flex;flex-wrap:wrap;gap:10px;}
.ov-proc{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink-2);
  background:#fff;border:1px solid var(--line);padding:10px 15px;border-radius:11px;box-shadow:var(--shadow-sm);}
.ov-proc svg{color:#13855A;}

/* ---------- empty state ---------- */
.empty{min-height:100%;display:flex;align-items:center;justify-content:center;padding:40px;}
.empty-inner{max-width:1240px;width:100%;text-align:center;}
.empty-badge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--brand);
  background:var(--brand-soft);padding:8px 14px;border-radius:99px;letter-spacing:.02em;}
.empty-title{font-size:38px;font-weight:800;letter-spacing:-.03em;margin:20px 0 0;}
.empty-sub{font-size:16px;color:var(--muted);max-width:60ch;margin:14px auto 0;line-height:1.55;}
.empty-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:40px;text-align:left;}
.empty-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;display:flex;flex-direction:column;
  align-items:flex-start;gap:6px;transition:.16s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.empty-card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--accent);opacity:0;transition:.16s;}
.empty-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--accent) 40%,var(--line));}
.empty-card:hover::before{opacity:1;}
.ec-dot{width:11px;height:11px;border-radius:50%;}
.ec-name{font-size:19px;font-weight:750;letter-spacing:-.01em;margin-top:6px;}
.ec-sector{font-size:12.5px;color:var(--muted);font-weight:500;}
.ec-barrier{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-weight:600;
  background:var(--surface-2);padding:7px 10px;border-radius:8px;margin-top:12px;}
.ec-barrier svg{color:var(--accent);flex:none;}
.ec-go{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent);margin-top:14px;}

/* ---------- AGFM fast closing ---------- */
.hero-run{margin-top:6px;}
.hero-run-inner{display:grid;grid-template-columns:1fr 1fr;gap:24px;background:var(--surface);border:1px solid var(--line);
  border-radius:20px;padding:30px;box-shadow:var(--shadow-sm);align-items:center;min-height:380px;}
.hero-run-left{padding-right:10px;}
.hero-run-title{font-size:27px;font-weight:750;letter-spacing:-.02em;margin:16px 0 0;line-height:1.18;}
.hero-run-text{font-size:15px;color:var(--muted);line-height:1.55;margin:12px 0 0;}
.hero-run-meta{display:flex;gap:26px;margin-top:24px;}
.hero-run-meta>div{display:flex;flex-direction:column;gap:4px;}
.hrm-k{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);}
.hrm-v{font-size:16px;font-weight:700;color:var(--ink);font-family:var(--font-mono);}
.hero-run-right{display:flex;align-items:center;justify-content:center;min-height:320px;}
.big-launch{width:260px;height:260px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#6B49A8,#3A266C);
  color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;
  box-shadow:0 30px 70px -24px rgba(58,38,108,.8);transition:.2s;}
.big-launch:hover{transform:scale(1.035);}
.big-launch-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(91,62,145,.4);animation:ring 2.4s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:.7;}100%{transform:scale(1.18);opacity:0;}}
.big-launch-label{font-size:17px;font-weight:700;max-width:160px;text-align:center;line-height:1.25;}
.pipeline{width:100%;display:flex;flex-direction:column;gap:14px;}
.pl-step{display:flex;gap:14px;align-items:flex-start;opacity:.5;transition:.3s;}
.pl-step.active,.pl-step.done{opacity:1;}
.pl-icon{width:34px;height:34px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex:none;font-family:var(--font-mono);font-weight:700;color:var(--muted);transition:.3s;}
.pl-step.active .pl-icon{background:var(--brand-soft);color:var(--brand);border-color:transparent;}
.pl-step.done .pl-icon{background:#13855A;color:#fff;border-color:transparent;}
.pl-num{font-size:14px;}
.pl-body{flex:1;min-width:0;}
.pl-row{display:flex;justify-content:space-between;align-items:center;}
.pl-label{font-size:14.5px;font-weight:650;color:var(--ink);}
.pl-pct{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--muted);}
.pl-track{height:7px;border-radius:99px;background:var(--line);margin:8px 0 5px;overflow:hidden;}
.pl-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5B3E91,#7C5BC0);transition:width .1s linear;}
.pl-detail{font-size:12.5px;color:var(--faint);}
.success-banner,.status-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(100deg,#EAF8F0,#F4FBF7);
  border:1px solid #C9ECD9;border-radius:14px;padding:16px 18px;font-size:14.5px;color:var(--ink-2);}
.success-banner strong,.status-banner strong{color:#0E6B47;font-weight:700;}
.status-sub{display:block;font-size:13px;color:var(--muted);margin-top:2px;font-weight:500;}

/* ---------- Edison doc intelligence ---------- */
.di-grid{display:grid;grid-template-columns:.92fr 1.08fr;gap:20px;align-items:start;}
.dropzone{border:2px dashed #C9CDE0;border-radius:18px;background:var(--surface-2);min-height:440px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:30px;transition:.18s;cursor:pointer;}
.dropzone:hover,.dropzone.over{border-color:var(--brand);background:var(--brand-soft);}
.dz-ic{width:64px;height:64px;border-radius:16px;background:#fff;border:1px solid var(--line);color:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
.dz-title{font-size:18px;font-weight:700;margin-top:6px;}
.dz-sub{font-size:13.5px;color:var(--muted);}
.dz-link{color:var(--brand);font-weight:700;text-decoration:underline;}
.dz-file{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font-size:13px;font-weight:600;color:var(--ink-2);
  background:#fff;border:1px solid var(--line);padding:9px 14px;border-radius:10px;font-family:var(--font-mono);}
.pdf-page{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:440px;font-size:13px;}
.pdf-scanline{position:absolute;left:0;right:0;height:80px;top:-80px;
  background:linear-gradient(180deg,transparent,rgba(91,62,145,.16),transparent);pointer-events:none;}
.pdf-scanline[data-on="true"]{animation:scan 1.7s linear infinite;}
@keyframes scan{0%{top:-80px;}100%{top:100%;}}
.pdf-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:16px;}
.pdf-from{font-size:16px;font-weight:750;}
.pdf-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.pdf-doctype{font-size:22px;font-weight:800;letter-spacing:.12em;color:var(--brand);}
.pdf-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid var(--line-2);}
.pdf-row span{color:var(--muted);}
.pdf-row b{font-family:var(--font-mono);font-weight:600;}
.pdf-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12.5px;}
.pdf-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);padding:8px 0;border-bottom:1px solid var(--line);}
.pdf-table th:last-child,.pdf-table td:last-child{text-align:right;font-family:var(--font-mono);}
.pdf-table th:nth-child(2),.pdf-table td:nth-child(2){text-align:center;}
.pdf-table td{padding:9px 0;border-bottom:1px solid var(--line-2);color:var(--ink-2);}
.pdf-totals{margin-top:8px;}
.pdf-row.total{border-bottom:none;border-top:2px solid var(--ink);margin-top:4px;padding-top:11px;font-size:15px;font-weight:700;}
.pdf-row.total b{color:var(--brand);}
.extract-card{overflow:hidden;}
.extract-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);background:var(--surface-2);}
.extract-body{padding:6px 18px 14px;}
.extract-empty{padding:40px 10px;text-align:center;color:var(--faint);font-size:13.5px;}
.field-wrap{opacity:0;transform:translateY(8px);}
.field-wrap.in{animation:fieldIn .4s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes fieldIn{to{opacity:1;transform:none;}}
.pulse-dot{width:9px;height:9px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 0 color-mix(in srgb,var(--brand) 50%,transparent);animation:pulse2 1.3s infinite;}
@keyframes pulse2{0%{box-shadow:0 0 0 0 rgba(91,62,145,.5);}70%{box-shadow:0 0 0 8px rgba(91,62,145,0);}100%{box-shadow:0 0 0 0 rgba(91,62,145,0);}}
.anomaly-stack{margin-top:18px;display:flex;flex-direction:column;gap:14px;}
.anomaly-box{background:linear-gradient(180deg,#FFF6F6,#fff);border:1px solid #F3C9C9;border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);}
.anomaly-head{display:flex;align-items:center;gap:13px;}
.anomaly-title{font-size:16px;font-weight:750;color:#B22A2A;}
.anomaly-tag{font-size:12px;color:#C76A6A;font-weight:600;margin-top:2px;}
.anomaly-text{font-size:14px;color:var(--ink-2);line-height:1.55;margin:14px 0;}
.anomaly-compare{display:flex;align-items:center;gap:14px;margin:14px 0;}
.ac-item{flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 14px;}
.ac-item.danger{border-color:#F0BcBc;background:#FFF3F3;}
.ac-k{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.ac-v{font-family:var(--font-mono);font-size:18px;font-weight:600;}
.ac-item.danger .ac-v{color:#C23434;}
.ac-vs{font-size:13px;font-weight:700;color:var(--faint);}
.hbars{display:flex;align-items:flex-end;gap:10px;height:90px;margin-top:6px;padding-top:8px;}
.hbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;}
.hbar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
.hbar-fill{width:100%;border-radius:5px 5px 0 0;background:#C9CDE0;transition:height .6s ease;}
.hbar-fill.danger{background:#D64545;}
.hbar-label{font-size:10.5px;color:var(--faint);font-family:var(--font-mono);}
.sync-row{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);}

/* ---------- Edison fraud table ---------- */
.fraud-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.fraud-filters{display:flex;gap:7px;}
.ff-chip{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:7px 13px;border-radius:99px;transition:.13s;}
.ff-chip:hover{color:var(--ink);background:#fff;}
.ff-chip.on{background:var(--brand);color:#fff;border-color:transparent;}
.fraud-table-wrap{overflow-x:auto;}
.fraud-table{width:100%;border-collapse:collapse;min-width:880px;}
.fraud-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700;padding:13px 16px;background:var(--surface-2);border-bottom:1px solid var(--line);white-space:nowrap;}
.fraud-table th.ta-r,.fraud-table td.ta-r{text-align:right;}
.fraud-table td{padding:14px 16px;border-bottom:1px solid var(--line-2);font-size:13.5px;color:var(--ink-2);vertical-align:middle;}
.fraud-table tr:last-child td{border-bottom:none;}
.frow{position:relative;transition:.12s;}
.frow:hover{background:var(--surface-2);}
.frow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
.frow.sev-high::before{background:#D64545;}
.frow.sev-medium::before{background:#D79A14;}
.frow.sev-low::before{background:#C2C6D8;}
.fr-file{display:flex;align-items:center;gap:8px;font-weight:650;color:var(--ink);}
.fr-file svg{color:var(--muted);flex:none;}
.fr-id{font-family:var(--font-mono);font-size:11.5px;color:var(--faint);margin-top:3px;margin-left:24px;}
.fr-supplier{font-weight:600;}
.fr-date{font-family:var(--font-mono);font-size:13px;color:var(--muted);white-space:nowrap;}
.fr-amount{font-family:var(--font-mono);font-weight:600;color:var(--ink);white-space:nowrap;}
.fr-type{font-weight:650;color:var(--ink);}
.fr-note{font-size:12px;color:var(--muted);margin-top:3px;max-width:280px;line-height:1.35;}
.risk-cell{display:flex;align-items:center;gap:9px;min-width:96px;}
.risk-track{flex:1;height:7px;border-radius:99px;background:var(--line);overflow:hidden;}
.risk-fill{height:100%;border-radius:99px;}
.risk-val{font-family:var(--font-mono);font-size:13px;font-weight:600;width:24px;text-align:right;}
.fr-action{font-size:12.5px;font-weight:650;color:var(--brand);background:var(--brand-soft);padding:7px 13px;border-radius:9px;white-space:nowrap;transition:.13s;}
.fr-action:hover{background:var(--brand);color:#fff;}

/* ---------- doc archive + invoices tables ---------- */
.doc-search{display:flex;align-items:center;gap:9px;flex:1;min-width:220px;max-width:380px;height:42px;padding:0 14px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--muted);}
.doc-search:focus-within{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft);}
.doc-search-input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--ink);}
.doc-tags{display:flex;gap:5px;margin-top:5px;margin-left:24px;flex-wrap:wrap;}
.doc-tag{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:2px 7px;border-radius:6px;}
.cat-pill{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);padding:5px 10px;border-radius:7px;white-space:nowrap;}
.table-empty{text-align:center;color:var(--faint);font-size:13.5px;padding:34px 10px;}
.doc-table{min-width:920px;}
.inv-table{min-width:980px;}
.inv-num{font-family:var(--font-mono);font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;}
.dir-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:650;padding:5px 9px;border-radius:7px;white-space:nowrap;}
.dir-pill.in{background:#EEE9F6;color:#5B3E91;}
.dir-pill.out{background:#E1F6FB;color:#0784A0;}
.inv-amt{font-family:var(--font-mono);font-size:13px;color:var(--muted);white-space:nowrap;}
.inv-vat{font-family:var(--font-mono);font-size:13px;color:var(--faint);white-space:nowrap;}
.inv-total{font-family:var(--font-mono);font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;}

/* ---------- Systra ---------- */
.grid-budget{display:grid;grid-template-columns:1.45fr .85fr;gap:18px;align-items:start;}
.legend{display:flex;gap:14px;align-items:center;}
.lg{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);font-weight:600;}
.lg i{width:14px;height:10px;border-radius:3px;display:inline-block;}
.whatif{display:flex;flex-direction:column;}
.whatif-title{font-size:18px;font-weight:750;margin:12px 0 0;}
.whatif-sub{font-size:13px;color:var(--muted);line-height:1.45;margin:6px 0 0;}
.whatif-value{font-family:var(--font-mono);font-size:54px;font-weight:600;text-align:center;margin:18px 0 10px;letter-spacing:-.02em;}
.whatif-value span{font-size:26px;color:var(--muted);}
.wi-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;outline:none;
  background:linear-gradient(90deg,#00B4DB 0%,#00B4DB var(--p),#E8EAF2 var(--p),#E8EAF2 100%);}
.wi-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid #5B3E91;box-shadow:var(--shadow);cursor:pointer;}
.wi-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid #5B3E91;cursor:pointer;}
.wi-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);font-family:var(--font-mono);margin-top:8px;}
.wi-presets{display:flex;gap:8px;margin-top:16px;}
.wi-chip{flex:1;padding:9px 0;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);font-family:var(--font-mono);transition:.13s;}
.wi-chip:hover{background:#fff;color:var(--ink);}
.wi-chip.on{background:var(--brand);color:#fff;border-color:transparent;}
.wi-impact{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
.wi-impact-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:var(--ink-2);}
.wi-impact-row b{font-family:var(--font-mono);font-size:18px;}
.wi-impact-note{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:10px;}
.wi-impact-note svg{color:var(--brand);}
.roi-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line);}
.roi-toggle{display:flex;align-items:center;gap:11px;font-size:13.5px;font-weight:600;color:var(--ink-2);}
.roi-table{width:100%;border-collapse:collapse;}
.roi-table th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700;padding:14px 22px;background:var(--surface-2);border-bottom:1px solid var(--line);}
.roi-table td{padding:16px 22px;border-bottom:1px solid var(--line-2);font-size:14px;color:var(--ink-2);vertical-align:middle;}
.roi-table tr:last-child td{border-bottom:none;}
.roi-item{font-weight:700;color:var(--ink);}
.roi-trad{color:var(--muted);}
.roi-ai{font-weight:650;color:var(--ink);font-family:var(--font-mono);font-size:13.5px;}
.roi-foot{display:flex;align-items:center;gap:10px;padding:16px 22px;background:var(--surface-2);font-size:13px;color:var(--muted);border-top:1px solid var(--line);}
.roi-foot svg{color:var(--brand);flex:none;}

/* ---------- MedicAir ---------- */
.ingest-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:14px;align-items:center;}
.sources-col{display:flex;flex-direction:column;gap:12px;transition:.4s;}
.source-card{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;box-shadow:var(--shadow-sm);transition:.3s;}
.source-card.active{border-color:color-mix(in srgb,var(--brand) 35%,var(--line));box-shadow:0 12px 26px -16px rgba(58,38,108,.4);}
.source-ic{width:42px;height:42px;border-radius:11px;background:var(--surface-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex:none;}
.source-card.active .source-ic{background:var(--brand-soft);color:var(--brand);}
.source-body{flex:1;min-width:0;}
.source-name{font-size:14px;font-weight:700;}
.source-meta{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-top:2px;}
.source-health{display:flex;align-items:center;gap:8px;margin-top:8px;}
.sh-track{flex:1;height:6px;border-radius:99px;background:var(--line);overflow:hidden;}
.sh-fill{height:100%;border-radius:99px;transition:width .3s ease,background .3s;}
.sh-val{font-size:11.5px;font-family:var(--font-mono);font-weight:600;color:var(--muted);width:34px;text-align:right;}
.source-status{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:5px 9px;border-radius:7px;flex:none;}
.source-status.disc{background:#F1F1F4;color:#999;}
.source-status.sync{background:var(--brand-soft);color:var(--brand);display:flex;}
.source-status.sync svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pipe-col{display:flex;align-items:center;justify-content:center;}
.pipe-arrows{color:var(--faint);position:relative;}
.unify-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 22px;transition:.3s;}
.unify-card.live{border-color:color-mix(in srgb,var(--brand) 40%,var(--line));box-shadow:0 18px 40px -20px rgba(58,38,108,.5);}
.unify-ic{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:.3s;}
.unify-card.live .unify-ic{animation:floaty 2s ease-in-out infinite;}
@keyframes floaty{50%{transform:translateY(-5px);}}
.unify-title{font-size:17px;font-weight:750;margin-top:14px;}
.unify-counters{display:flex;gap:14px;width:100%;margin:18px 0;}
.uc{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px 10px;}
.uc-val{font-family:var(--font-mono);font-size:22px;font-weight:600;letter-spacing:-.01em;}
.uc-lab{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.3;}
.unify-progress{display:flex;align-items:center;gap:10px;width:100%;}
.up-track{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
.up-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#5B3E91,#00B4DB);transition:width .1s linear;}
.unify-progress span{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--muted);width:42px;text-align:right;}

/* ---------- Esperto AIchain chat ---------- */
.tb-expert{display:flex;align-items:center;gap:7px;height:42px;padding:0 14px;border-radius:11px;
  background:linear-gradient(100deg,#5B3E91,#00B4DB);color:#fff;font-weight:650;font-size:13.5px;
  box-shadow:0 8px 20px -8px rgba(91,62,145,.7);transition:.15s;}
.tb-expert:hover{filter:brightness(1.08);transform:translateY(-1px);}
.tb-expert svg{color:#fff;}
.expert-fab{position:fixed;right:26px;bottom:26px;z-index:60;display:flex;align-items:center;gap:10px;
  height:54px;padding:0 20px 0 16px;border-radius:99px;background:linear-gradient(100deg,#3A266C,#5B3E91 55%,#00B4DB);
  color:#fff;font-weight:700;font-size:15px;box-shadow:0 16px 40px -12px rgba(58,38,108,.7);transition:.18s;}
.expert-fab:hover{transform:translateY(-2px) scale(1.02);}
.expert-fab.hidden{opacity:0;pointer-events:none;transform:translateY(10px);}
.ef-ic{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;}
.ef-ic svg{animation:twinkle 2.6s ease-in-out infinite;}
@keyframes twinkle{0%,100%{transform:rotate(0) scale(1);opacity:.9;}50%{transform:rotate(20deg) scale(1.12);opacity:1;}}
.chat-overlay{position:fixed;inset:0;background:rgba(15,12,40,.34);backdrop-filter:blur(2px);z-index:70;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.chat-overlay.show{opacity:1;pointer-events:auto;}
.chat-drawer{position:fixed;top:0;right:0;bottom:0;width:430px;max-width:92vw;background:#fff;z-index:80;
  display:flex;flex-direction:column;box-shadow:-24px 0 60px -20px rgba(20,15,50,.4);
  transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);}
.chat-drawer.open{transform:none;}
.chat-head{display:flex;align-items:center;gap:12px;padding:18px 18px;
  background:linear-gradient(105deg,#0C0A33,#231654 60%,#2C2270);color:#fff;flex:none;}
.chat-ava{width:42px;height:42px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#5B3E91,#00B4DB);box-shadow:0 6px 16px -6px rgba(0,180,219,.6);}
.chat-id{flex:1;min-width:0;}
.chat-name{font-weight:700;font-size:16px;}
.chat-role{display:flex;align-items:center;gap:6px;font-size:12px;color:#B9BAE6;margin-top:2px;}
.chat-live{width:7px;height:7px;border-radius:50%;background:#00E6E6;box-shadow:0 0 0 3px rgba(0,230,230,.25);}
.chat-close{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:#fff;background:rgba(255,255,255,.1);transition:.13s;flex:none;}
.chat-close:hover{background:rgba(255,255,255,.2);}
.chat-ctx{display:flex;align-items:center;gap:7px;padding:10px 18px;font-size:12.5px;color:var(--muted);
  background:var(--surface-2);border-bottom:1px solid var(--line);flex:none;}
.chat-ctx b{color:var(--ink-2);}
.chat-ctx svg{color:var(--brand);}
.chat-body{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px;background:var(--bg);}
.msg{display:flex;gap:9px;max-width:90%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-ava{width:28px;height:28px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#5B3E91,#00B4DB);color:#fff;margin-top:2px;}
.msg-bubble{padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5;}
.msg.bot .msg-bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:5px;color:var(--ink-2);box-shadow:var(--shadow-sm);}
.msg.user .msg-bubble{background:var(--brand);color:#fff;border-top-right-radius:5px;}
.typing{display:flex;gap:5px;align-items:center;padding:14px;}
.typing span{width:7px;height:7px;border-radius:50%;background:#C2C6D8;animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}
.chat-sugg{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px 4px;flex:none;background:var(--bg);}
.sugg-chip{font-size:12.5px;font-weight:600;color:var(--brand);background:var(--brand-soft);
  border:1px solid color-mix(in srgb,var(--brand) 20%,transparent);padding:7px 12px;border-radius:99px;transition:.13s;}
.sugg-chip:hover{background:#fff;}
.sugg-chip:disabled{opacity:.5;}
.chat-input{display:flex;gap:9px;padding:12px 18px 6px;flex:none;background:var(--bg);}
.ci-field{flex:1;height:44px;padding:0 15px;border-radius:12px;border:1px solid var(--line);background:#fff;
  font-family:inherit;font-size:14px;color:var(--ink);outline:none;transition:.13s;}
.ci-field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);}
.ci-send{width:44px;height:44px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;
  background:var(--brand);color:#fff;transition:.13s;}
.ci-send:hover{filter:brightness(1.08);}
.ci-send:disabled{opacity:.4;}
.chat-foot-note{font-size:11px;color:var(--faint);text-align:center;padding:4px 18px 14px;background:var(--bg);flex:none;}

@media (max-width:1180px){
  .kpi-grid,.kpi-grid.kpi-3,.empty-cards{grid-template-columns:repeat(2,1fr);}
  .grid-2,.di-grid,.grid-budget{grid-template-columns:1fr;}
  .hero-run-inner{grid-template-columns:1fr;}
  .ingest-grid{grid-template-columns:1fr;}
  .pipe-col{display:none;}
}
</style>
</head>
<body>
